name: Release Library

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.0)'
        required: true
        type: string

jobs:
  # ─── Tag: creates and pushes the git tag when triggered manually ────────────
  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Create and push tag
        id: tag
        run: |
          VERSION="v${{ inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  # ─── Resolve version for tag-push triggered runs ────────────────────────────
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - name: Output tag name
        id: v
        run: echo "version=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"

  # ─── Android: publish AAR to GitHub Packages (Maven) ────────────────────────
  publish-android:
    name: Publish Android AAR
    runs-on: ubuntu-latest
    needs: [create-tag, resolve-version]
    if: always() && !cancelled() && !failure()
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish AAR to GitHub Packages
        run: ./gradlew :shared:publishAndroidReleasePublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.create-tag.outputs.version || needs.resolve-version.outputs.version }}

  # ─── iOS: build XCFramework, create GitHub Release, update Package.swift ────
  publish-ios:
    name: Publish iOS XCFramework
    runs-on: macos-latest
    needs: [create-tag, resolve-version]
    if: always() && !cancelled() && !failure()
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build XCFramework
        run: ./gradlew :shared:assembleSharedReleaseXCFramework --no-daemon
        env:
          RELEASE_VERSION: ${{ needs.create-tag.outputs.version || needs.resolve-version.outputs.version }}

      - name: Zip XCFramework
        run: |
          cd shared/build/XCFrameworks/release
          zip -r ../../../../shared.xcframework.zip shared.xcframework

      - name: Compute SHA-256 checksum
        id: checksum
        run: echo "sha256=$(shasum -a 256 shared.xcframework.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload XCFramework
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-tag.outputs.version || needs.resolve-version.outputs.version }}
          files: shared.xcframework.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          VERSION="${{ needs.create-tag.outputs.version || needs.resolve-version.outputs.version }}"
          CHECKSUM="${{ steps.checksum.outputs.sha256 }}"
          URL="https://github.com/${{ github.repository }}/releases/download/${VERSION}/shared.xcframework.zip"
          sed -i '' "s|url: \"[^\"]*\"|url: \"${URL}\"|" Package.swift
          sed -i '' "s|checksum: \"[^\"]*\"|checksum: \"${CHECKSUM}\"|" Package.swift
          git add Package.swift
          git diff --cached --quiet || git commit -m "chore: update Package.swift for ${VERSION}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
