name: Publish Library

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── Android: publica el AAR en GitHub Packages (Maven) ───────────────────
  publish-android:
    name: Publish Android AAR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Publish AAR to GitHub Packages
        run: ./gradlew :shared:publishAndroidReleasePublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_VERSION: ${{ github.ref_name }}

  # ─── iOS: construye el XCFramework y lo publica como Binary SPM ───────────
  publish-ios:
    name: Publish iOS XCFramework
    runs-on: macos-latest
    permissions:
      contents: write   # necesario para crear el Release y hacer push
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # necesario para el push posterior a main

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build XCFramework
        run: ./gradlew :shared:assembleSharedReleaseXCFramework
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Zip XCFramework
        run: |
          cd shared/build/XCFrameworks/release
          zip -r ../../../../shared.xcframework.zip shared.xcframework

      - name: Compute SHA-256 checksum
        id: checksum
        run: echo "sha256=$(shasum -a 256 shared.xcframework.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: shared.xcframework.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift
        env:
          VERSION: ${{ github.ref_name }}
          CHECKSUM: ${{ steps.checksum.outputs.sha256 }}
          REPO: ${{ github.repository }}
        run: |
          URL="https://github.com/${REPO}/releases/download/${VERSION}/shared.xcframework.zip"
          python3 -c "
          import re, os
          url = os.environ['URL']
          checksum = os.environ['CHECKSUM']
          with open('Package.swift') as f:
              content = f.read()
          content = re.sub(r'url: \"[^\"]*\"', 'url: \"' + url + '\"', content)
          content = re.sub(r'checksum: \"[^\"]*\"', 'checksum: \"' + checksum + '\"', content)
          with open('Package.swift', 'w') as f:
              f.write(content)
          "

      - name: Commit and push Package.swift
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add Package.swift
          git diff --cached --quiet || git commit -m "chore: update Package.swift for ${{ github.ref_name }}"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
